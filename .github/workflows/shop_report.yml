name: Shop Report Automation (V2 Modular)

on:
  schedule:
    - cron: '30 5 * * *'
    - cron: '35 13 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Modular Pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          FAMILY_NUMBERS: ${{ secrets.FAMILY_NUMBERS }}
          SHOP_ORDER: ${{ secrets.SHOP_ORDER }}

          GMAIL_TOKEN_DATA: ${{ secrets.GMAIL_TOKEN_JSON }} 
        run: |
          # Create the token.json file from the secret
          echo "$GMAIL_TOKEN_DATA" > token.json
          python main.py

      - name: Save Data and Token Updates
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add token.json data/*.json
          
          git commit -m "Auto-update: Refresh token and dashboard data [skip ci]" || echo "No changes to commit"
          git push

      - name: Notify on Failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d "chat_id=${TELEGRAM_CHAT_ID}" \
          -d "text=⚠️ *Pipeline Alert:* The Shop Report run failed. Check GitHub Actions log." \
          -d "parse_mode=Markdown"